<div class="desktop-stage">
  <div class="stage-noise"></div>
  <div class="stage-glow"></div>

  <div class="computer-rig" aria-label="CRT computer display frame">
    <div class="monitor-shell">
      <div class="monitor-top-ridge"></div>

      <div class="monitor-bezel">
        <div class="speaker speaker-left" aria-hidden="true"></div>
        <div class="speaker speaker-right" aria-hidden="true"></div>
        <div class="power-led" aria-hidden="true"></div>

        <div class="screen-glass">
          <div class="crt-screen app-crt-screen">
            <div class="crt-grain"></div>
            <div class="crt-scanline-bar"></div>

            <div class="screen-content">
              <div class="browser-chrome">
                <div class="browser-toolbar">
                  <button class="browser-btn browser-back" (click)="goBack()" aria-label="Back" title="Back">◀</button>
                  <button class="browser-btn browser-forward" (click)="goForward()" aria-label="Forward" title="Forward">▶</button>
                  <button class="browser-btn browser-refresh" (click)="refresh()" aria-label="Refresh" title="Refresh">⟳</button>
                  <button class="browser-btn browser-home" (click)="goHome()" aria-label="Home" title="Home">⌂</button>
                </div>
                <div class="browser-address-bar">
                  <span class="browser-lock">🔒</span>
                  <input type="text" class="browser-url-input" [value]="currentUrl" (input)="onUrlInput($event)" (keydown)="onUrlKeydown($event)" aria-label="Address bar">
                </div>
                <div class="browser-progress">
                  <div class="progress-bar" [style.width.%]="scrollProgress * 100"></div>
                </div>
              </div>
              <div class="screen-warp">
                <div class="screen-inner">
                  <router-outlet />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="monitor-neck"></div>
      <div class="monitor-base"></div>
      <div class="monitor-shadow"></div>
    </div>
  </div>
</div>
